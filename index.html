<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAY BLAZE \\\ TRUST CORP</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            background-color: #f8f9fa;
            color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* ----> currently available kits --- */
        .top-nav {
            position: absolute;
            top: 30px;
            width: 100%; 
            display: flex; 
            justify-content: center; 
            z-index: 100;
        }

        .btn-available {
            display: inline-block;
            padding: 14px 28px;
            background-color: #111827;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 1px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
        }

            .btn-available:hover {
                transform: translateY(-3px); 
                background-color: #374151;
                box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            }

        .hero-gallery {
            width: 100vw;
            height: 550px;
            margin-top: 80px; 
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: none; 
            -ms-overflow-style: none; 
        }

            .hero-gallery::-webkit-scrollbar {
                display: none; 
            }

        .gallery-track {
            display: flex;
            gap: 30px;
            padding: 0 40px; 
            width: max-content;
        }

        .gallery-item {
            width: 450px;
            height: 450px;
            background-color: #e9ecef;
            border-radius: 20px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #adb5bd;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            cursor: pointer; 
        }

            .gallery-item img, .gallery-item video {
                width: 100%;
                height: 100%;
                object-fit: cover;
                border-radius: inherit;
            }

            .gallery-item:hover {
                transform: scale(1.05); 
                box-shadow: 0 20px 40px rgba(0,0,0,0.2);
                z-index: 10;
                transition: transform 0.4s ease 0.5s, box-shadow 0.4s ease 0.5s;
            }


        .spacer {
            height: 40vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-direction: column;
            text-align: center;
        }

            .spacer h1 {
                font-size: 3rem;
                margin-bottom: 10px;
            }

        .cards-container {
            padding: 20vh 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card {
            width: 90%;
            max-width: 1100px;
            height: 70vh;
            margin: -8vh 0;
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid #e5e7eb;
            border-radius: 30px;
            position: relative;
            overflow: hidden;
            transform: scale(0.85);
            opacity: 0.5;
            z-index: 1;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s ease, box-shadow 0.6s ease;
            will-change: transform, opacity;
        }

            .card:first-child {
                margin-top: 0;
            }

            .card:last-child {
                margin-bottom: 0;
            }

            .card.active {
                transform: scale(1.05);
                opacity: 1;
                z-index: 10;
                box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15);
            }

        model-viewer {
            width: 100%;
            height: 100%;
            background-color: transparent;
            outline: none;
            --poster-color: transparent;
            touch-action: pan-y;
        }

        .card-content {
            position: absolute;
            top: 40px;
            left: 50px;
            z-index: 10;
            pointer-events: none;
        }

            .card-content h2 {
                font-size: 3rem;
                margin: 0;
                color: #111827;
                text-shadow: 0 2px 10px rgba(255,255,255,0.8);
            }

            .card-content p {
                color: #4b5563;
                font-size: 1.2rem;
                font-weight: 500;
            }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="#" target="_blank" class="btn-available">CURRENTLY AVAILABLE</a>
    </div>

    <div class="hero-gallery">
        <div class="gallery-track">
            <div class="gallery-item">
                <img src="IMG_0588.png" alt="L1">
            </div>
            <div class="gallery-item">
                <img src="IMG_0586.png" alt="L2">
            </div>
            <div class="gallery-item">
                <img src="IMG_0589.png" alt="L3">
            </div>
            <div class="gallery-item">
                <img src="IMG_0587.png" alt="L5">
            </div>
            <div class="gallery-item">
                <img src="IMG_0600.png" alt="L6">
            </div>
        </div>
    </div>

    <div class="spacer">
        <h1>Latest works</h1>
        <p>Scroll down</p>
    </div>

    <div class="cards-container">

        <div class="card">
            <div class="card-content">
                <h2>IS200/IS300/ALTEZZA</h2>
                <p>Grill IS200/IS300/ALTEZZA</p>
            </div>
            <model-viewer src="is200grillv11.glb" auto-rotate camera-controls disable-zoom shadow-intensity="1"></model-viewer>
        </div>

        <div class="card">
            <div class="card-content">
                <h2>MX-5 NA</h2>
                <p>MX-5 NA Headlight Cover</p>
            </div>
            <model-viewer src="NAHeadlightCover3.glb" auto-rotate camera-controls disable-zoom shadow-intensity="1"></model-viewer>
        </div>

        <div class="card">
            <div class="card-content">
                <h2>RPS13 180SX/200SX/240SX</h2>
                <p>RPS13 COVER</p>
            </div>
            <model-viewer src="S13HEADLIGHTLIDv2.3.glb" auto-rotate camera-controls disable-zoom shadow-intensity="1"></model-viewer>
        </div>

        <div class="card">
            <div class="card-content">
                <h2>RPS13 180SX/200SX/240SX</h2>
                <p>RPS13 WING</p>
            </div>
            <model-viewer src="WINGxS13.glb" auto-rotate camera-controls disable-zoom shadow-intensity="1"></model-viewer>
        </div>

        <div class="card">
            <div class="card-content">
                <h2>RPS13 180SX/200SX/240SX</h2>
                <p>RPS13 ROOFWING</p>
            </div>
            <model-viewer src="S13ROOFWING.glb" auto-rotate camera-controls disable-zoom shadow-intensity="1"></model-viewer>
        </div>

        <div class="card">
            <div class="card-content">
                <h2>RPS13 180SX/200SX/240SX</h2>
                <p>RPS13 HANDLE</p>
            </div>
            <model-viewer src="S13_SWITCH_DRIVER_V1_30.glb" auto-rotate camera-controls disable-zoom shadow-intensity="1"></model-viewer>
        </div>

    </div>

    <script>
        const cards = document.querySelectorAll('.card');
        const observerOptions = {
            root: null,
            rootMargin: "-40% 0px -40% 0px",
            threshold: 0
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                } else {
                    entry.target.classList.remove('active');
                }
            });
        }, observerOptions);

        cards.forEach(card => observer.observe(card));
    </script>
</body>
</html>
